<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ George Football Hub</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#050505;
color:white;
height:100vh;
overflow:hidden;
position:relative;
}

/* iOS Glow Background */
body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(100px);
opacity:.5;
z-index:-1;
}

body::before{
width:350px;
height:350px;
background:#007aff;
top:-100px;
left:-100px;
}

body::after{
width:300px;
height:300px;
background:#7c3aed;
bottom:-100px;
right:-100px;
}

/* Header */
.header{
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
font-size:22px;
font-weight:700;
}

.live{
padding:8px 14px;
border-radius:20px;
background:rgba(0,255,136,.15);
border:1px solid rgba(0,255,136,.4);
color:#00ff88;
font-weight:600;
}

/* Buttons */
.buttons{
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;

background:rgba(255,255,255,.04);
backdrop-filter:blur(15px);
}

.buttons button{
border:none;
padding:12px 18px;
border-radius:14px;

background:rgba(255,255,255,.08);
color:white;

font-size:15px;
font-weight:600;

cursor:pointer;

backdrop-filter:blur(12px);

transition:.25s;
}

.buttons button:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.15);
}

.buttons button:active{
transform:scale(.98);
}

/* Player */
.player{
height:calc(100vh - 140px);
padding:10px;
}

.player iframe{
width:100%;
height:100%;
border:none;
border-radius:18px;

background:black;

box-shadow:
0 0 25px rgba(0,122,255,.25),
0 0 50px rgba(124,58,237,.15);
}

/* Footer */
.footer{
height:50px;
display:flex;
align-items:center;
justify-content:center;

font-size:12px;
color:rgba(255,255,255,.6);

background:rgba(255,255,255,.04);
backdrop-filter:blur(15px);
}
.live{
display:flex;
align-items:center;
gap:8px;
padding:8px 14px;
border-radius:20px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
color:white;
font-weight:600;
}

.live-icon{
width:10px;
height:10px;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/86/FIFA_World_Cup_2026_logo.svg/120px-FIFA_World_Cup_2026_logo.svg.png" class="wc-logo">
FIFA World Cup Streams
</div>
<div class="live">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Red_dot.svg/32px-Red_dot.svg.png" class="live-icon">
MATCHDAY
</div>
</div><div class="buttons">
<button onclick="loadStream(stream1)">FOX4K</button>
<button onclick="loadStream(stream2)">FOX1 4K</button>
<button onclick="loadStream(stream3)">Backup 1</button>
<button onclick="loadStream(stream4)">Backup 2</button>
</div><div class="player">
<iframe id="player"></iframe>
</div><div class="footer">
FIFA World Cup 2026
</div><script>
const stream1 = "https://junkieembeds.pages.dev/embed/fox4k-usa";
const stream2 = "https://junkieembeds.pages.dev/embed/fox-sports-1-4k";
const stream3 = "PUT_URL_3_HERE";
const stream4 = "PUT_URL_4_HERE";

function loadStream(url){
document.getElementById("player").src = url;
}

loadStream(stream1);
</script></body>
</html>
