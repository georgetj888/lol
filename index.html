<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stream Player</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: #00f2ff;
            --accent: #ff3b30;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg) 100%); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navbar */
        nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .live-badge { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        
        /* Video Container */
        .player-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; transition: all 0.5s ease; }
        .video-box { position: relative; width: 80%; aspect-ratio: 16 / 9; border-radius: 20px; overflow: hidden; background: #000; padding: 3px; }
        
        /* Neon Border */
        .neon-border { position: absolute; inset: 0; border-radius: 20px; padding: 3px; background: linear-gradient(45deg, var(--neon), #7000ff, var(--neon)); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: xor; animation: rotate 3s linear infinite; }
        @keyframes rotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
        
        iframe { width: 100%; height: 100%; border-radius: 17px; border: none; }
        
        /* Overlay */
        .buffering { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 10; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }

        /* Controls */
        .controls { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); backdrop-filter: blur(15px); }
        button { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

        .tv-mode { width: 100% !important; padding: 0; border-radius: 0; }
        .tv-mode iframe { border-radius: 0; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav>
        <div class="live-badge"><span class="dot"></span> FOX STREAM ● LIVE</div>
        <div id="bitrate">Bitrate: 8500 Kbps</div>
    </nav>

    <div class="player-wrapper" id="wrapper">
        <div class="video-box" id="player">
            <div class="neon-border"></div>
            <div class="buffering" id="loader"><div class="spinner"></div></div>
            <iframe src="https://junkieembeds.pages.dev/embed/fox4k-usa" allowfullscreen></iframe>
        </div>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 10px;">
            <button onclick="toggleFullscreen()">Fullscreen</button>
            <button onclick="toggleTV()">TV Mode</button>
            <button onclick="refreshStream()">Refresh</button>
        </div>
        <div id="status">Low Latency: Stable</div>
    </div>

    <script>
        function toggleFullscreen() {
            const el = document.getElementById('player');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }

        function toggleTV() {
            document.getElementById('wrapper').classList.toggle('tv-mode');
        }

        function refreshStream() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            setTimeout(() => { loader.style.display = 'none'; }, 2000);
        }

        setInterval(() => {
            const bitrate = Math.floor(Math.random() * (9500 - 7000 + 1) + 7000);
            document.getElementById('bitrate').innerText = `Bitrate: ${bitrate} Kbps`;
        }, 3000);
    </script>
</body>
</html>
