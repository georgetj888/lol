<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOX 4K Live</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0b0c10;
    color: white;
}

/* Top Bar */
.header {
    padding: 18px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

/* Main Container */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 15px;
}

/* Video Box */
.player {
    width: 95%;
    max-width: 900px;
    aspect-ratio: 16/9;
    background: #111;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    position: relative;
}

/* Fake overlay UI style */
.glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent);
    pointer-events: none;
}

/* LIVE badge */
.live {
    position: absolute;
    top: 12px;
    left: 12px;
    background: red;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 12px;
    font-weight: bold;
}

/* Bottom Controls */
.controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
}

.btn {
    padding: 10px 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: rgba(255,255,255,0.15);
    transform: scale(1.05);
}

/* Footer */
.footer {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="header">FOX 4K LIVE STREAM</div>

<div class="container">

    <div class="player">
        <div class="live">● LIVE</div>
        <div class="glow"></div>

        <!-- YOUR STREAM HERE -->
        <iframe 
            src="https://junkieembeds.pages.dev/embed/fox4k-usa"
            width="100%" height="100%" 
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="controls">
        <button class="btn">⛶ Fullscreen</button>
        <button class="btn">🔊 Volume</button>
        <button class="btn">🔄 Refresh</button>
    </div>

    <div class="footer">
        Stable connection • 4K Quality • iOS-style UI
    </div>

</div>

</body>
</html>
