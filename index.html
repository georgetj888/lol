<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Live Hub</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#14161c,#07080c);
    color:white;
}

/* WRAPPER */
.wrapper{
    width:90%;
    max-width:700px;
    text-align:center;
}

/* LIVE */
.live{
    display:inline-block;
    background:red;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    animation:pulse 1.2s infinite;
    margin-bottom:15px;
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}

/* CARD */
.card{
    position:relative;
    overflow:hidden;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

/* EMBED PLAYER */
.player{
    width:100%;
    aspect-ratio:16/9;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:20px;
    background:black;
    border:1px solid rgba(255,255,255,0.1);
}

.player iframe{
    width:100%;
    height:100%;
    border:none;
}

/* TEAMS */
.teams{
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
}

/* SCORE */
.score{
    font-size:40px;
    font-weight:700;
    margin:10px 0;
    letter-spacing:2px;
}

/* STATUS */
.status{
    margin-top:10px;
    font-size:13px;
    color:#00ff99;
}

/* DETAILS */
.details{
    font-size:13px;
    opacity:0.7;
    margin-top:10px;
}

/* SHINE */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(0,255,200,0.12),transparent);
    animation:shine 3.5s infinite;
}

@keyframes shine{
    0%{left:-100%;}
    50%{left:100%;}
    100%{left:100%;}
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="live">● LIVE MATCH</div>

        <div class="player">

        <div class="score" id="score">- : -</div>

        <div class="status" id="status">Connecting...</div>

        <div class="details" id="details">World Cup Live Center • Auto updating</div>

    </div>

</div>
