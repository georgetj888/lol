<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 | Broadcast</title>
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --bg-color: #000000;
            --surface-color: #161617;
            --accent-color: #0071e3; /* Apple Blue */
            --text-main: #f5f5f7;
            --text-dim: #a1a1a6;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            width: 80px;
            background: #0a0a0a;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            gap: 30px;
        }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }

        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .video-player iframe { width: 100%; height: 100%; border: none; }

        /* Match Details Panel */
        .match-panel {
            margin-top: 30px;
            background: var(--surface-color);
            padding: 30px;
            border-radius: 20px;
        }

        .scoreboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .team-box { display: flex; align-items: center; gap: 20px; }
        .team-logo { width: 60px; height: 60px; background: #333; border-radius: 50%; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: #222;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="sidebar">
        <div style="font-size: 24px;">⚽</div>
        <div style="font-size: 24px; opacity: 0.5;">📺</div>
    </nav>

    <main class="main-content">
        <div class="video-player">
            <iframe src="https://junkieembeds.pages.dev/embed/fox4k-usa" allowfullscreen></iframe>
        </div>

        <section class="match-panel">
            <div class="scoreboard-row">
                <div class="team-box">
                    <div class="team-logo"></div>
                    <h2>BRAZIL</h2>
                </div>
                <div style="font-size: 3rem; font-weight: 700;">2 - 1</div>
                <div class="team-box">
                    <h2>GERMANY</h2>
                    <div class="team-logo"></div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div style="color: var(--text-dim)">Possession</div>
                    <div style="font-size: 1.5rem; font-weight: 600;">55% - 45%</div>
                </div>
                <div class="stat-card">
                    <div style="color: var(--text-dim)">Shots on Goal</div>
                    <div style="font-size: 1.5rem; font-weight: 600;">4 - 2</div>
                </div>
                <div class="stat-card">
                    <div style="color: var(--text-dim)">Corners</div>
                    <div style="font-size: 1.5rem; font-weight: 600;">6 - 3</div>
                </div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
