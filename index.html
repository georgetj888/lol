<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Apple Style</title>
    <style>
        /* Apple-inspired aesthetic */
        body {
            margin: 0;
            background-color: #000;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Player Wrapper */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 18px;
            background: #111;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .description {
            margin-top: 30px;
            color: #a1a1a6;
            max-width: 600px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Now Playing</h1>
    
    <div class="video-container">
        <iframe 
            src="https://junkieembeds.pages.dev/embed/fox4k-usa" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="description">
        <p>Experience high-quality streaming. Please ensure your source link is embedded correctly for the best viewing experience.</p>
    </div>
</div>

</body>
</html>
