<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 FIFA World Cup Streams</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#050505;
height:100vh;
overflow:hidden;
color:white;
position:relative;
}

/* Glow Background */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:#007aff;
border-radius:50%;
filter:blur(120px);
top:-100px;
left:-100px;
opacity:.45;
z-index:-1;
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:#7c3aed;
border-radius:50%;
filter:blur(120px);
bottom:-100px;
right:-100px;
opacity:.45;
z-index:-1;
}

/* Header */
.header{
height:75px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:700;
}

.logo img{
height:40px;
}

.badge{
display:flex;
align-items:center;
gap:8px;

padding:8px 14px;
border-radius:20px;

background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
}

.dot{
width:10px;
height:10px;
background:#00ff88;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}

/* Buttons */
.buttons{
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;

background:rgba(255,255,255,.04);
backdrop-filter:blur(15px);
}

.buttons button{
border:none;
padding:12px 18px;
border-radius:14px;

background:rgba(255,255,255,.08);
color:white;

font-size:15px;
font-weight:600;

cursor:pointer;
transition:.25s;
}

.buttons button:hover{
background:rgba(255,255,255,.15);
transform:translateY(-2px);
}

/* Player */
.player{
height:calc(100vh - 145px);
padding:10px;
}

.player iframe{
width:100%;
height:100%;
border:none;
border-radius:18px;

box-shadow:
0 0 30px rgba(0,122,255,.25),
0 0 60px rgba(124,58,237,.15);
}

/* Footer */
.footer{
height:40px;
display:flex;
justify-content:center;
align-items:center;

font-size:12px;
color:rgba(255,255,255,.6);
}
</style></head><body><div class="header"><div class="logo">
🏆 FIFA World Cup Streams
</div><div class="badge">
<div class="dot"></div>
WORLD CUP 2026
</div></div><div class="buttons">
<button onclick="loadStream(stream1)">FOX4K</button>
<button onclick="loadStream(stream2)">FOX1 4K</button>
<button onclick="loadStream(stream3)">Backup 1</button>
<button onclick="loadStream(stream4)">Backup 2</button>
</div><div class="player">
<iframe id="player"></iframe>
</div><div class="footer">
FIFA World Cup 2026 • Live Streaming Hub
</div><script>

const stream1 = "https://junkieembeds.pages.dev/embed/fox4k-usa";
const stream2 = "https://junkieembeds.pages.dev/embed/fox-sports-1-4k";
const stream3 = "PUT_URL_3_HERE";
const stream4 = "PUT_URL_4_HERE";

function loadStream(url){
document.getElementById("player").src = url;
}

loadStream(stream1);

</script></body>
</html>
