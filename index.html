<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Live</title>

<style>
:root {
    --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
}

body {
    margin: 0;
    font-family: var(--font-family);
    background: #000;
    color: #fff;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.nav-list {
    display: flex;
    gap: 40px;
    list-style: none;
}

.nav-list a {
    color: #f5f5f7;
    text-decoration: none;
    font-size: 12px;
}

/* HERO UPDATED */
.hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding-top: 120px;
    min-height: 100vh;
}

/* EMBED PLAYER */
.player {
    width: 90%;
    max-width: 900px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    margin-bottom: 25px;
}

.player iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* LIVE BADGE */
.live {
    margin-bottom: 15px;
    background: red;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}

/* TEXT */
.teams {
    font-size: 34px;
    font-weight: 600;
    margin-bottom: 8px;
}

.status {
    font-size: 16px;
    color: #86868b;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<nav>
    <ul class="nav-list">
        <li><a href="#">World Cup</a></li>
        <li><a href="#">Live</a></li>
        <li><a href="#">Matches</a></li>
    </ul>
</nav>

<div class="hero">

    <!-- LIVE BADGE -->
    <div class="live">● LIVE MATCH</div>

    <!-- EMBED PLAYER -->
    <div class="player">
        <iframe src="https://junkieembeds.pages.dev/embed/fox4k-usa" allowfullscreen></iframe>
    </div>

    <!-- MATCH INFO -->
    <div class="teams" id="teams">Brazil vs Morocco</div>
    <div class="status" id="status">1 - 0 • First Half • Live</div>

</div>

</body>
</html>
