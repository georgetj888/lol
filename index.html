<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live | World Cup 2026</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Match Header */
        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .live-badge {
            background-color: #e30613; /* Iconic sports red */
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.6; } }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Video Container with stadium-style border */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid #222;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Match Info Section */
        .match-info {
            margin-top: 25px;
            padding: 20px;
            background: #111;
            border-radius: 12px;
            border-left: 4px solid #e30613;
        }

        .match-info h2 { margin-top: 0; font-size: 1.2rem; color: #aaa; }
        .match-info p { margin: 5px 0 0; font-size: 1.5rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="match-header">
        <h1>FIFA World Cup 2026</h1>
        <div class="live-badge">Live Now</div>
    </div>
    
    <div class="video-wrapper">
        <iframe 
            src="https://junkieembeds.pages.dev/embed/fox4k-usa" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="match-info">
        <h2>Currently Streaming</h2>
        <p>Group Stage: Match Day Analysis & Live Coverage</p>
    </div>
</div>

</body>
</html>
